<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔍 Binary Search Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #08080e;
    --surface: #0f0f1a;
    --border: #1a1a2e;
    --blue: #4d9fff;
    --blue-dim: #4d9fff22;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffd700;
    --orange: #ff8c00;
    --text: #d0d0e8;
    --text-dim: #505070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    color: var(--blue);
    text-shadow: 0 0 30px #4d9fff44;
    text-align: center;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 6px 0 28px;
    text-align: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    width: 100%;
    max-width: 740px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    color: var(--blue);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  /* Array display */
  .array-display {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 70px;
    align-items: center;
    padding: 8px 0;
  }

  .cell {
    width: 48px;
    height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 700;
    position: relative;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
    background: #0a0a14;
  }

  .cell .idx {
    position: absolute;
    top: 3px;
    font-size: 0.52rem;
    color: var(--text-dim);
    font-weight: 400;
  }

  .cell.search-range {
    border-color: #333355;
    background: #0e0e20;
    color: var(--text);
  }

  .cell.out-of-range {
    opacity: 0.25;
    border-color: #1a1a1a;
  }

  .cell.mid {
    border-color: var(--blue);
    background: var(--blue-dim);
    color: var(--blue);
    box-shadow: 0 0 16px #4d9fff44;
    transform: scale(1.1);
  }

  .cell.found {
    border-color: var(--green);
    background: #00ff8820;
    color: var(--green);
    box-shadow: 0 0 20px #00ff8866;
    transform: scale(1.15);
  }

  .cell.target-highlight {
    border-color: var(--yellow);
  }

  /* Pointers */
  .pointer-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 22px;
    margin-top: 4px;
  }

  .ptr {
    width: 48px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    letter-spacing: 1px;
    transition: all 0.35s;
    color: transparent;
    border-radius: 2px;
  }

  .ptr.L { color: var(--orange); }
  .ptr.R { color: var(--red); }
  .ptr.M { color: var(--blue); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 14px;
  }

  input[type=number] {
    background: #0d0d1a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 8px 14px;
    border-radius: 3px;
    width: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=number]:focus { border-color: var(--blue); }

  .btn {
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 18px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    border-radius: 3px;
  }

  .btn:hover { background: var(--blue-dim); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.green { border-color: var(--green); color: var(--green); }
  .btn.green:hover { background: #00ff8818; }

  /* Step info */
  .step-info {
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    padding: 12px 16px;
    font-size: 0.72rem;
    line-height: 2;
    border-radius: 0 4px 4px 0;
    margin-bottom: 12px;
  }

  .step-info .hl-left { color: var(--orange); }
  .step-info .hl-right { color: var(--red); }
  .step-info .hl-mid { color: var(--blue); }
  .step-info .hl-found { color: var(--green); }
  .step-info .hl-miss { color: var(--red); }

  /* History */
  .history {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
  }

  .hist-row {
    display: flex;
    gap: 10px;
    font-size: 0.65rem;
    color: var(--text-dim);
    border-left: 2px solid var(--border);
    padding-left: 8px;
    padding: 3px 8px;
    animation: slideIn 0.3s;
  }

  .hist-row.active { border-color: var(--blue); color: var(--text); }
  .hist-row.found-row { border-color: var(--green); color: var(--green); }
  .hist-row.miss-row { border-color: var(--red); color: var(--red); }

  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }

  /* complexity */
  .complexity-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .complexity-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 2px;
    transition: width 0.5s;
  }

  /* mode tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: fit-content;
  }

  .tab {
    padding: 7px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--text-dim);
    letter-spacing: 1px;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
  }

  .tab:last-child { border-right: none; }
  .tab.active { background: var(--blue-dim); color: var(--blue); }
</style>
</head>
<body>

<h1>🔍 BinarySearchService</h1>
<div class="subtitle">O(log n) · Визуализатор · search() + searchFirst()</div>

<div class="card">
  <div class="card-title">Настройки</div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('search',this)">search()</button>
    <button class="tab" onclick="setMode('searchFirst',this)">searchFirst()</button>
  </div>
  <div class="controls">
    <div style="font-size:0.72rem;color:var(--text-dim);">Target:</div>
    <input type="number" id="targetInput" value="37" min="1" max="99">
    <button class="btn" onclick="generateArray()">🎲 Новый массив</button>
    <button class="btn green" id="startBtn" onclick="startSearch()">▶ Запустить</button>
    <button class="btn" id="stepBtn" onclick="doStep()" disabled>→ Шаг</button>
    <button class="btn" id="autoBtn" onclick="autoPlay()" disabled>⚡ Авто</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Массив</div>
  <div class="array-display" id="arrayDisplay"></div>
  <div class="pointer-row" id="pointerRow"></div>
</div>

<div class="card">
  <div class="card-title">Текущий шаг</div>
  <div class="step-info" id="stepInfo">Нажмите ▶ Запустить, чтобы начать.</div>
  <div style="display:flex;gap:20px;font-size:0.65rem;color:var(--text-dim);margin-top:8px;flex-wrap:wrap;">
    <span>Шаг: <span id="stepCount" style="color:var(--blue)">—</span></span>
    <span>left: <span id="leftVal" style="color:var(--orange)">—</span></span>
    <span>right: <span id="rightVal" style="color:var(--red)">—</span></span>
    <span>mid: <span id="midVal" style="color:var(--blue)">—</span></span>
    <span>arr[mid]: <span id="arrMidVal" style="color:var(--text)">—</span></span>
  </div>
  <div class="complexity-bar" style="margin-top:10px;">
    <div class="complexity-fill" id="complexityFill" style="width:0%"></div>
  </div>
  <div style="font-size:0.58rem;color:var(--text-dim);margin-top:4px;">Прогресс: log₂(<span id="nVal">—</span>) ≈ <span id="logNVal">—</span> шагов</div>
</div>

<div class="card">
  <div class="card-title">История шагов</div>
  <div class="history" id="history"></div>
</div>

<script>
let arr = [], target = 37, steps = [], stepIdx = 0, mode = 'search';
let autoTimer = null;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  reset();
}

function generateArray() {
  const n = 16;
  const set = new Set();
  while (set.size < n) set.add(Math.floor(Math.random()*99)+1);
  arr = [...set].sort((a,b)=>a-b);

  if (mode === 'searchFirst' && Math.random() < 0.6) {
    const dupVal = arr[Math.floor(Math.random()*arr.length)];
    const pos = Math.floor(Math.random()*arr.length);
    arr.splice(pos, 0, dupVal);
    if (arr.length > 16) arr.pop();
    arr.sort((a,b)=>a-b);
  }

  reset();
  renderArray(-1, -1, -1, []);
}

function reset() {
  steps = [];
  stepIdx = 0;
  clearInterval(autoTimer);
  autoTimer = null;
  document.getElementById('stepBtn').disabled = true;
  document.getElementById('autoBtn').disabled = true;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stepInfo').innerHTML = 'Нажмите ▶ Запустить, чтобы начать.';
  document.getElementById('history').innerHTML = '';
  document.getElementById('stepCount').textContent = '—';
  document.getElementById('leftVal').textContent = '—';
  document.getElementById('rightVal').textContent = '—';
  document.getElementById('midVal').textContent = '—';
  document.getElementById('arrMidVal').textContent = '—';
  document.getElementById('complexityFill').style.width = '0%';
  renderArray(-1,-1,-1,[]);
}

function computeSteps(arr, target, mode) {
  const steps = [];
  let left = 0, right = arr.length - 1;
  let result = -1;

  while (left <= right) {
    const mid = left + Math.floor((right - left) / 2);
    steps.push({ left, right, mid, val: arr[mid], result: null });

    if (arr[mid] === target) {
      if (mode === 'search') {
        steps[steps.length-1].result = mid;
        steps[steps.length-1].done = true;
        break;
      } else {
        result = mid;
        steps[steps.length-1].foundAt = mid;
        right = mid - 1;
      }
    } else if (arr[mid] < target) {
      left = mid + 1;
    } else {
      right = mid - 1;
    }
  }

  if (mode === 'searchFirst' && result !== -1) {
    steps[steps.length-1].result = result;
    steps[steps.length-1].done = true;
  } else if (!steps.some(s=>s.done)) {
    steps.push({ left, right, mid: -1, val: null, result: -1, done: true, notFound: true });
  }

  return steps;
}

function startSearch() {
  target = parseInt(document.getElementById('targetInput').value) || 37;
  if (!arr.length) generateArray();
  steps = computeSteps(arr, target, mode);
  stepIdx = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stepBtn').disabled = false;
  document.getElementById('autoBtn').disabled = false;
  document.getElementById('nVal').textContent = arr.length;
  document.getElementById('logNVal').textContent = Math.ceil(Math.log2(arr.length));
  document.getElementById('history').innerHTML = '';
  applyStep();
}

function doStep() {
  if (stepIdx >= steps.length) return;
  stepIdx++;
  if (stepIdx >= steps.length) {
    document.getElementById('stepBtn').disabled = true;
    document.getElementById('autoBtn').disabled = true;
  }
  applyStep();
}

function autoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('autoBtn').textContent = '⚡ Авто'; return; }
  document.getElementById('autoBtn').textContent = '⏸ Стоп';
  autoTimer = setInterval(() => {
    if (stepIdx >= steps.length) {
      clearInterval(autoTimer); autoTimer = null;
      document.getElementById('autoBtn').textContent = '⚡ Авто';
      return;
    }
    stepIdx++;
    applyStep();
  }, 900);
}

function applyStep() {
  const s = steps[stepIdx - 1];
  if (!s) return;

  const maxSteps = steps.length;
  const pct = Math.min(100, (stepIdx / maxSteps) * 100);
  document.getElementById('complexityFill').style.width = pct + '%';
  document.getElementById('stepCount').textContent = stepIdx;
  document.getElementById('leftVal').textContent = s.left;
  document.getElementById('rightVal').textContent = s.right;
  document.getElementById('midVal').textContent = s.mid >= 0 ? s.mid : '—';
  document.getElementById('arrMidVal').textContent = s.val !== null ? s.val : '—';

  // highlight range
  const inRange = [];
  for (let i = s.left; i <= s.right; i++) inRange.push(i);

  if (s.done && !s.notFound) {
    renderArray(s.mid, s.left, s.right, inRange, s.result);
  } else {
    renderArray(s.mid, s.left, s.right, inRange, -2);
  }

  // step info
  let info = '';
  if (s.notFound) {
    info = `<span class="hl-miss">❌ Не найдено.</span> left(${s.left}) > right(${s.right}) — выход из цикла.\n<code>return -1;</code>`;
  } else if (s.done) {
    info = `<span class="hl-found">✅ Найдено!</span> arr[<span class="hl-mid">${s.mid}</span>] = ${s.val} = target(${target})\n<code>return ${s.result};</code>`;
  } else if (s.foundAt !== undefined) {
    info = `arr[<span class="hl-mid">${s.mid}</span>] = <span class="hl-found">${s.val} = target</span> — запомнили (${s.foundAt}), идём левее: right = mid-1 = <span class="hl-right">${s.right}</span>`;
  } else if (arr[s.mid] < target) {
    info = `arr[<span class="hl-mid">${s.mid}</span>] = ${s.val} &lt; target(${target}) → ищем <b>правее</b>: left = mid+1 = <span class="hl-left">${s.left}</span>`;
  } else {
    info = `arr[<span class="hl-mid">${s.mid}</span>] = ${s.val} &gt; target(${target}) → ищем <b>левее</b>: right = mid-1 = <span class="hl-right">${s.right}</span>`;
  }
  document.getElementById('stepInfo').innerHTML = info;

  // history
  const hist = document.getElementById('history');
  const row = document.createElement('div');
  const cls = s.notFound ? 'miss-row' : (s.done ? 'found-row' : 'active');
  row.className = `hist-row ${cls}`;
  row.innerHTML = `<span style="color:var(--text-dim);width:24px">#${stepIdx}</span><span>L=${s.left} R=${s.right} M=${s.mid>=0?s.mid:'—'} arr[M]=${s.val!==null?s.val:'—'}</span>`;
  hist.appendChild(row);
  hist.scrollTop = hist.scrollHeight;
}

function renderArray(mid, left, right, inRange, found) {
  const display = document.getElementById('arrayDisplay');
  const ptrRow = document.getElementById('pointerRow');
  display.innerHTML = '';
  ptrRow.innerHTML = '';

  arr.forEach((v, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    if (found !== undefined && found === i) {
      cell.classList.add('found');
    } else if (i === mid && found !== -2) {
      cell.classList.add('mid');
    } else if (inRange.includes(i)) {
      cell.classList.add('search-range');
    } else if (inRange.length > 0) {
      cell.classList.add('out-of-range');
    }

    if (v === target && found === undefined) cell.classList.add('target-highlight');

    cell.innerHTML = `<span class="idx">[${i}]</span>${v}`;
    display.appendChild(cell);

    // pointer
    const ptr = document.createElement('div');
    ptr.className = 'ptr';
    const tags = [];
    if (i === left) tags.push('<span class="hl-left">L</span>');
    if (i === right) tags.push('<span class="hl-right">R</span>');
    if (i === mid) tags.push('<span class="hl-mid">M</span>');
    if (tags.length) { ptr.innerHTML = tags.join(' '); ptr.className += ' ' + (i===mid?'M':'') + (i===left?' L':'') + (i===right?' R':''); }
    ptrRow.appendChild(ptr);
  });
}

generateArray();
</script>
</body>
</html>
